[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show local variables on failure
addopts =
    -v
    --tb=short
    --strict-markers

markers =
    unit: Unit tests — no external dependencies
    integration: Integration tests — mock external services
    slow: Tests that take >1s
